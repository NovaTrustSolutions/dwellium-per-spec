<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mercury portrait">
  <defs>
    <radialGradient id="mc-bg" cx="50%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="52%" stop-color="#082230" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#04101a"/>
    </radialGradient>
    <linearGradient id="mc-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="mc-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="240" height="240" rx="28" fill="url(#mc-bg)"/>
  <rect x="6" y="6" width="228" height="228" rx="24" fill="none" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="1.5"/>
  <g filter="url(#mc-glow)">
    <path d="M58 214 Q58 156 120 156 Q182 156 182 214 Z" fill="url(#mc-face)" opacity="0.5"/>
    <circle cx="120" cy="108" r="42" fill="url(#mc-face)"/>
  </g>
  <!-- winged helmet -->
  <g fill="none" stroke="#e0f2fe" stroke-opacity="0.9" stroke-width="2.6" stroke-linecap="round">
    <path d="M150 84 q18 -4 30 2 q-12 5 -26 4"/>
    <path d="M150 92 q20 -2 32 5 q-13 4 -27 2"/>
    <path d="M90 84 q-18 -4 -30 2 q12 5 26 4"/>
    <path d="M90 92 q-20 -2 -32 5 q13 4 27 2"/>
  </g>
  <!-- speed chevrons across the face -->
  <g fill="none" stroke="#7dd3fc" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round">
    <path d="M104 104 l12 8 l-12 8"/>
    <path d="M122 104 l12 8 l-12 8"/>
  </g>
  <!-- nodes -->
  <g fill="#bae6fd">
    <circle cx="150" cy="128" r="2.6"/><circle cx="92" cy="128" r="2.6"/>
  </g>
  <!-- discipline badge: lightning -->
  <circle cx="196" cy="196" r="23" fill="#04101a" stroke="#38bdf8" stroke-width="1.6"/>
  <path d="M199 183 l-10 15 h7 l-3 12 l11 -16 h-7 z" fill="#7dd3fc" stroke="#bae6fd" stroke-width="1" stroke-linejoin="round"/>
</svg>
