name: Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies (exact lockfile)
        run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Verify dist output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed — no dist/ directory"
            exit 1
          fi
          echo "✅ Build succeeded — dist/ contains:"
          ls -la dist/
