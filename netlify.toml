# Netlify deploy config — Dwellium (the app lives in the qualia-shell/ subdirectory).
#
# Netlify builds a STATIC SPA: react-router.config.ts sets ssr:false when the
# NETLIFY env var is present, so `react-router build` emits a client-only bundle
# in build/client with NO server function. (The full SSR server bundle exceeds
# Netlify's Function upload limit, and this login-gated shell gains nothing from
# SSR.) Locally + in CI, SSR stays on.
#
# `base` points Netlify at the app subdir; all paths below are relative to it.

[build]
  base = "qualia-shell"
  # `git fetch --unshallow` first so the commit-count app version is accurate on
  # Netlify's shallow clone (no-ops on a complete clone).
  command = "git fetch --unshallow 2>/dev/null || true; react-router build && node scripts/write-netlify-redirects.mjs"
  publish = "build/client"

[build.environment]
  NODE_VERSION = "22"
  # Real backend is hosted on Cloud Run; keep demo seeds off for production.
  VITE_APPFOLIO_SEEDS = "false"
  # One Save sync (encrypted per-account API keys, workspaces, etc.) so they
  # persist across devices. Requires NETLIFY_API_PROXY_TARGET (set in the Netlify
  # site env) to point /api/* at the Cloud Run backend; otherwise sync is inert.
  VITE_ONE_SAVE = "true"

[dev]
  command = "react-router dev"

# scripts/write-netlify-redirects.mjs emits:
# - /api/* -> $NETLIFY_API_PROXY_TARGET/api/:splat when that env var is set.
# - /* -> /index.html for SPA deep-link refreshes.
#
# Keep this fallback here too so a manual deploy that skips the postbuild script
# still serves the client shell for deep links.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (plan 011). The CSP ships in REPORT-ONLY mode first so it
# reports violations without blocking anything — review reports on real usage,
# then flip `Content-Security-Policy-Report-Only` -> `Content-Security-Policy`
# to enforce, and later tighten `style-src` (drop 'unsafe-inline').
#
# connect-src is the enumerated set of outbound origins the app actually calls
# (LLM providers + search + weather + Supabase), derived from
# `grep -rhoE "https://..." qualia-shell/src/lib qualia-shell/src/config.ts`,
# plus 'self' (the /api/* + /health proxy is same-origin, so the Cloud Run
# backend origin is NOT needed here). 'unsafe-inline' on style-src reflects the
# app's widespread inline styles; tightening it is a deliberate later step.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; media-src 'self'; connect-src 'self' https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com https://api.tavily.com https://api.search.brave.com https://api.open-meteo.com https://geocoding-api.open-meteo.com https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
