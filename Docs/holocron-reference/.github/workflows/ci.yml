name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  editor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
