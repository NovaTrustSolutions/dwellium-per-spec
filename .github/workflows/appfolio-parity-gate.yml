name: AppFolio Parity Gate

# Gate for Phase 0-5 of the AppFolio parity plan.
# Triggered on pushes to main and PRs touching canonical types, the Strata
# frontend, seed data, or the appfolioParity test suite.
# See Docs/AppFolio_Parity_Implementation_Plan_v2.md §13.

on:
  push:
    branches: [main]
    paths:
      - 'packages/types/**'
      - 'qualia-shell/src/**'
      - 'qualia-shell/public/data/**'
      - 'qualia-shell/src/test/appfolioParity/**'
      - 'qualia-shell/src/components/StrataDashboard/fixtures/appfolioDerived/**'
      - 'Scripts/derive_appfolio_fixtures.mjs'
      - 'Scripts/verify_no_pii_leak.mjs'
      - '.github/workflows/appfolio-parity-gate.yml'
  pull_request:
    paths:
      - 'packages/types/**'
      - 'qualia-shell/src/**'
      - 'qualia-shell/public/data/**'
      - 'qualia-shell/src/test/appfolioParity/**'
      - 'qualia-shell/src/components/StrataDashboard/fixtures/appfolioDerived/**'
      - 'Scripts/derive_appfolio_fixtures.mjs'
      - 'Scripts/verify_no_pii_leak.mjs'
      - '.github/workflows/appfolio-parity-gate.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Build, test, and verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node (tracks qualia-shell/.nvmrc)
        uses: actions/setup-node@v5
        with:
          node-version-file: 'qualia-shell/.nvmrc'
          cache: npm
          cache-dependency-path: qualia-shell/package-lock.json

      - name: Install dependencies
        working-directory: qualia-shell
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript build (tsc -b)
        working-directory: qualia-shell
        run: npx tsc -b

      - name: Vitest
        working-directory: qualia-shell
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=../Docs/Baselines/ci_vitest_${{ github.run_id }}.xml
        continue-on-error: false

      - name: Install Playwright browsers (chromium only for baseline)
        working-directory: qualia-shell
        run: npx playwright install --with-deps chromium

      # Phase-7 Task 7.3 (2026-05-12): conjoined "Playwright baseline E2E" step split into
      # 2 distinct steps so axe-baseline can be flipped blocking while screenshot-baseline
      # stays sheltered pending Linux-platform baseline capture (Tasks 7.4-7.6). Completes
      # the 2-subtask blocking-gate arc started at Task 7.2 (spec hard-assert at
      # qualia-shell/e2e/axe-baseline.spec.ts:131 — expect(violations.length).toBe(0)).
      # Phase 0.0 Task 0.0.9 captured screenshot baselines on macOS (darwin) only; CI runs
      # on Linux where Chromium renders differ sub-pixel, so screenshot-diff stays
      # non-blocking until Linux-platform baselines are captured.
      #
      # Phase-7 Task 7.6 (2026-05-13): screenshot-baseline workflow shield removed
      # (continue-on-error: true → false) after Task 7.5 inaugural Linux baseline capture
      # landed 8 *-chromium-linux.png artifacts on main at squash SHA 16c2ac2 (PR #60 via
      # capture run 25779329286). Empirical signal: parity gate run 25780671522 on the 7.5
      # auto-branch showed the screenshot-baseline step 8 passed in 3.1m on Linux CI under
      # the current configuration (first-time green; captured baselines pixel-correct vs
      # Linux render output). Completes the 5-step screenshot-baseline blocking-gate arc
      # end-to-end (SPEC toHaveScreenshot hard-assert by construction + WORKFLOW step-split
      # @ 7.3 + INFRASTRUCTURE @ 7.4 + CAPTURE @ 7.5 + GATE-FLIP @ 7.6). Both blocking-gate
      # arcs (axe-baseline + screenshot-baseline) now genuinely blocking on Linux CI.
      - name: Playwright axe-baseline E2E (a11y assertion-blocking)
        working-directory: qualia-shell
        continue-on-error: false
        run: npx playwright test --config playwright.baseline.config.ts --project=chromium e2e/axe-baseline.spec.ts

      - name: Playwright screenshot-baseline E2E (visual regression; gate-flipped at Task 7.6)
        working-directory: qualia-shell
        continue-on-error: false   # FLIPPED from true at Task 7.6; sheltered until 7.5 Linux baselines landed at 16c2ac2; 7.6 removes the shield
        run: npx playwright test --config playwright.baseline.config.ts --project=chromium --grep-invert "axe accessibility baseline"

      - name: Vite build (seeds=true)
        working-directory: qualia-shell
        env:
          VITE_APPFOLIO_SEEDS: 'true'
        run: npx vite build

      - name: Vite build (seeds=false)
        working-directory: qualia-shell
        env:
          VITE_APPFOLIO_SEEDS: 'false'
        run: npx vite build

      - name: PII leak scan (strict)
        run: node Scripts/verify_no_pii_leak.mjs

      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: parity-gate-${{ github.run_id }}
          path: |
            qualia-shell/playwright-report
            qualia-shell/test-results
            Docs/Baselines/ci_vitest_${{ github.run_id }}.xml
          retention-days: 14
